<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ON DUTY POINT CALCULATOR DISDAMKAR OCDIDRP</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .logo {
      width: 65px;
      height: 65px;
      border-radius: 12px;
      box-shadow: 0 0 12px orange;
      object-fit: cover;
    }

    h1 {
      font-size: 22px;
      color: orange;
      margin: 0;
    }

    .time-group {
      margin: 15px 0;
    }

    input, select {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      background: orange;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffb84d;
    }

    .result {
      margin-top: 25px;
      font-size: 20px;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>ON DUTY POINT CALCULATOR DISDAMKAR OCDIDRP</h1>
</div>

<div class="time-group">
  <label>Jam Mulai:</label><br>
  <input type="time" id="start">
  <select id="startAmPm">
    <option>AM</option>
    <option>PM</option>
  </select>
</div>

<div class="time-group">
  <label>Jam Selesai:</label><br>
  <input type="time" id="end">
  <select id="endAmPm">
    <option>AM</option>
    <option>PM</option>
  </select>
</div>

<button onclick="hitung()">Hitung</button>

<div class="result" id="output"></div>

<div class="footer">
  made by ramoz ganteng
</div>

<script>
function convertToMinutes(time, ampm) {
  let [hour, minute] = time.split(":").map(Number);

  if (ampm === "PM" && hour < 12) hour += 12;
  if (ampm === "AM" && hour === 12) hour = 0;

  return hour * 60 + minute;
}

function hitung() {
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let startAmPm = document.getElementById("startAmPm").value;
  let endAmPm = document.getElementById("endAmPm").value;

  if (!start || !end) {
    alert("Isi jam dulu!");
    return;
  }

  let startMin = convertToMinutes(start, startAmPm);
  let endMin = convertToMinutes(end, endAmPm);

  if (endMin <= startMin) {
    endMin += 24 * 60;
  }

  let diff = endMin - startMin;
  let points = Math.floor(diff / 30);
  let sisa = diff % 30;

  document.getElementById("output").innerText =
    "Durasi: " + diff + " menit | Poin: " + points + " | Sisa: " + sisa + " menit";
}
</script>

</body>
</html>
